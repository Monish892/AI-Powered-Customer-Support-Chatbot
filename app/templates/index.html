
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant | Nexus AI</title>
    <meta name="description" content="An AI-powered chat assistant built with Python, Flask, and AIML.">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
             <div class="logo-container">
                <svg width="32" height="32" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M128 64C128 99.3462 99.3462 128 64 128C28.6538 128 0 99.3462 0 64C0 28.6538 28.6538 0 64 0C99.3462 0 128 28.6538 128 64Z" fill="var(--primary)"/><path d="M73.4916 48.0536L64.0354 35.881L54.5209 48.0536H39.881V80.1251H57.8572V92.119L64.0354 84.1542L70.1552 92.119V80.1251H88.119V48.0536H73.4916ZM64.0354 75.2959C60.211 75.2959 57.1296 72.2144 57.1296 68.39C57.1296 64.5656 60.211 61.4841 64.0354 61.4841C67.8598 61.4841 70.9412 64.5656 70.9412 68.39C70.9412 72.2144 67.8598 75.2959 64.0354 75.2959Z" fill="var(--background)"/></svg>
                <h1>AI Assistant</h1>
            </div>
            <span class="status-indicator"></span>
        </header>
        
        <main class="chat-window" id="chat-window">
             <!-- Chat messages will be appended here by JavaScript -->
             <div class="message bot-message">
                <div class="message-content">
                    <p>Hello! I'm an AI assistant powered by Nexus AI. How can I help you today?</p>
                </div>
             </div>
        </main>

        <footer class="chat-footer">
            <form id="chat-form" class="chat-form">
                <input type="text" id="message-input" placeholder="Ask me anything..." autocomplete="off" required>
                <button type="submit" aria-label="Send Message">
                    <i data-lucide="send-horizontal"></i>
                </button>
            </form>
            <div class="footer-branding">
                <p>Powered by <a href="#" target="_blank">Nexus AI</a></p>
            </div>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
      lucide.createIcons();
    </script>
</body>
</html>
